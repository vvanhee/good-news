<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Substantive positive news from science, space, and humanity">
  <title>Good News</title>

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Good News">
  <link rel="apple-touch-icon" id="touch-icon">

  <!-- Theme color -->
  <meta name="theme-color" content="#f5f4ef" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)">

  <style>
    /* ── Reset & base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f5f4ef;
      --bg-card:     #ffffff;
      --bg-hover:    #f0efe8;
      --text:        #1a1a18;
      --text-2:      #52524e;
      --text-3:      #8a8a84;
      --accent:      #2a7d4f;
      --accent-dim:  #e6f2eb;
      --border:      #e2e1d8;
      --shadow:      0 1px 4px rgba(0,0,0,.07);
      --shadow-lg:   0 4px 16px rgba(0,0,0,.11);
      --radius:      12px;
      --header-h:    60px;

      /* category tag colours */
      --c-space:   #1a6ea8;  --c-space-bg:   #e6f1fa;
      --c-science: #6a3fa8;  --c-science-bg: #f0eaf9;
      --c-human:   #a83f3f;  --c-human-bg:   #faeaea;
      --c-tech:    #7a6020;  --c-tech-bg:    #faf5e6;
      --c-general: #2a7d4f;  --c-general-bg: #e6f2eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #0f1117;
        --bg-card:     #1a1d27;
        --bg-hover:    #1f2333;
        --text:        #e8e6df;
        --text-2:      #9e9c94;
        --text-3:      #5e5c56;
        --accent:      #3db374;
        --accent-dim:  #192e22;
        --border:      #252836;
        --shadow:      0 1px 4px rgba(0,0,0,.25);
        --shadow-lg:   0 4px 16px rgba(0,0,0,.45);

        --c-space:   #62aadd;  --c-space-bg:   #0e1e2e;
        --c-science: #a87adb;  --c-science-bg: #1e122e;
        --c-human:   #db7a7a;  --c-human-bg:   #2e1212;
        --c-tech:    #d4ac50;  --c-tech-bg:    #2a2210;
        --c-general: #3db374;  --c-general-bg: #0e2218;
      }
    }

    html { font-size: 16px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 760px;
      margin: 0 auto;
      padding: 0 16px;
      height: var(--header-h);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      font-size: 1.3rem;
      color: var(--accent);
      line-height: 1;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--text);
    }

    /* ── Crawl button ────────────────────────────────────────────── */
    #crawl-btn {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }

    #crawl-btn:active { transform: scale(.96); opacity: .9; }
    #crawl-btn:disabled { opacity: .55; cursor: default; }

    .header-meta {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 16px 6px;
      text-align: right;
    }

    .crawled-at {
      font-size: .72rem;
      color: var(--text-3);
    }

    .dot-pulse {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.7);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: .3; transform: scale(.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* ── Progress bar ────────────────────────────────────────────── */
    #progress-wrap {
      overflow: hidden;
      max-height: 0;
      transition: max-height .25s ease;
    }

    #progress-wrap.visible { max-height: 28px; }

    #progress-bar-track {
      height: 3px;
      background: var(--border);
    }

    #progress-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width .35s ease;
    }

    #progress-label {
      text-align: center;
      font-size: .72rem;
      color: var(--text-3);
      padding: 3px 0 2px;
    }

    /* ── Feed ────────────────────────────────────────────────────── */
    #feed {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 12px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    @media (min-width: 540px) {
      #feed { padding: 20px 20px 48px; gap: 12px; }
    }

    /* ── Empty state ─────────────────────────────────────────────── */
    #empty-state {
      text-align: center;
      padding: 72px 24px;
      color: var(--text-3);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: .5;
    }

    #empty-state h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 8px;
    }

    #empty-state p {
      font-size: .9rem;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto;
    }

    /* ── Article card ────────────────────────────────────────────── */
    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      transition: box-shadow .15s, transform .15s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    @media (hover: hover) {
      .article-card:hover {
        box-shadow: var(--shadow-lg);
        transform: translateY(-1px);
      }
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .source-tag {
      font-size: .7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: .02em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .source-tag.cat-space   { color: var(--c-space);   background: var(--c-space-bg); }
    .source-tag.cat-science { color: var(--c-science); background: var(--c-science-bg); }
    .source-tag.cat-human   { color: var(--c-human);   background: var(--c-human-bg); }
    .source-tag.cat-tech    { color: var(--c-tech);    background: var(--c-tech-bg); }
    .source-tag.cat-general { color: var(--c-general); background: var(--c-general-bg); }

    .card-date {
      font-size: .72rem;
      color: var(--text-3);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }

    @media (min-width: 540px) {
      .card-title { font-size: 1.05rem; }
    }

    .card-excerpt {
      font-size: .875rem;
      color: var(--text-2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
      font-size: .8rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }

    .card-link:hover { text-decoration: underline; }

    /* ── Spinner ─────────────────────────────────────────────────── */
    #spinner {
      text-align: center;
      padding: 24px;
      color: var(--text-3);
      font-size: .85rem;
    }

    .spin-ring {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Offline / error toast ───────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom, 24px));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: .85rem;
      font-weight: 500;
      opacity: 0;
      transition: transform .3s ease, opacity .3s ease;
      white-space: nowrap;
      pointer-events: none;
      z-index: 200;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Sentinel ────────────────────────────────────────────────── */
    #sentinel { height: 1px; }
  </style>
</head>
<body>

<div id="app">
  <header class="app-header">
    <div class="header-inner">
      <div class="logo-wrap">
        <span class="logo-icon">◉</span>
        <h1>Good News</h1>
      </div>
      <button id="crawl-btn">↻ Refresh</button>
    </div>
    <div class="header-meta">
      <span id="crawled-at" class="crawled-at"></span>
    </div>
  </header>

  <main id="feed">
    <div id="empty-state">
      <div class="empty-icon">◎</div>
      <h2>Loading news…</h2>
      <p>Fetching the latest articles from science journals, substacks, space feeds, and curated communities.</p>
    </div>
    <div id="sentinel"></div>
  </main>

  <div id="spinner" hidden>
    <span class="spin-ring"></span>Loading more…
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// Articles are pre-crawled server-side every 6 hours by GitHub Actions
// and stored in data/articles.json. This page just loads that file.

// ── State ─────────────────────────────────────────────────────────────────────
const state = { articles: [], display: [], rendered: 0, loading: false };
const PAGE_SIZE = 20;
const PAGE_INC  = 10;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const $feed      = document.getElementById('feed');
const $sentinel  = document.getElementById('sentinel');
const $btn       = document.getElementById('crawl-btn');
const $spinner   = document.getElementById('spinner');
const $emptyState= document.getElementById('empty-state');
const $toast     = document.getElementById('toast');
const $crawledAt = document.getElementById('crawled-at');

// ── Utilities ─────────────────────────────────────────────────────────────────
function relativeTime(date) {
  const ms = Date.now() - date.getTime();
  const min = Math.floor(ms / 60000);
  if (min < 1)  return 'just now';
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  if (hr < 24)  return hr + 'h ago';
  const d = Math.floor(hr / 24);
  if (d < 8)    return d + 'd ago';
  return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

let toastTimer;
function showToast(msg, duration) {
  duration = duration || 4000;
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { $toast.classList.remove('show'); }, duration);
}

// ── Interleave by source (round-robin) ────────────────────────────────────────
// Takes one article from each source per round so every source appears
// at the top before any source gets a second slot.
function buildDisplayOrder(articles) {
  const buckets = {};
  const sourceIds = [];
  for (let i = 0; i < articles.length; i++) {
    const a = articles[i];
    if (!buckets[a.sourceId]) { buckets[a.sourceId] = []; sourceIds.push(a.sourceId); }
    buckets[a.sourceId].push(a);
  }
  const result = [];
  let hasMore = true;
  while (hasMore) {
    hasMore = false;
    const round = [];
    for (let j = 0; j < sourceIds.length; j++) {
      const id = sourceIds[j];
      if (buckets[id].length > 0) { round.push(buckets[id].shift()); hasMore = true; }
    }
    round.sort(function(a, b) { return b.dateMs - a.dateMs; });
    for (let k = 0; k < round.length; k++) result.push(round[k]);
  }
  return result;
}

// ── Render ────────────────────────────────────────────────────────────────────
function buildCard(article) {
  const el = document.createElement('article');
  el.className = 'article-card';
  const dateStr = relativeTime(new Date(article.dateMs));
  const excerptHtml = article.excerpt
    ? '<p class="card-excerpt">' + article.excerpt + '</p>' : '';
  el.innerHTML =
    '<div class="card-meta">' +
      '<span class="source-tag cat-' + article.category + '">' + article.source + '</span>' +
      '<time class="card-date">' + dateStr + '</time>' +
    '</div>' +
    '<h2 class="card-title">' + article.title + '</h2>' +
    excerptHtml +
    '<a class="card-link" href="' + article.url + '" target="_blank" rel="noopener noreferrer">Read article ↗</a>';
  return el;
}

function renderBatch(count) {
  count = count || PAGE_SIZE;
  const batch = state.display.slice(state.rendered, state.rendered + count);
  if (!batch.length) return;
  const frag = document.createDocumentFragment();
  for (let i = 0; i < batch.length; i++) frag.appendChild(buildCard(batch[i]));
  $feed.insertBefore(frag, $sentinel);
  state.rendered += batch.length;
  $spinner.hidden = state.rendered >= state.display.length;
}

// ── Infinite scroll ───────────────────────────────────────────────────────────
function setupObserver() {
  try {
    const observer = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting && !state.loading && state.rendered < state.display.length) {
        renderBatch(PAGE_INC);
      }
    }, { rootMargin: '300px' });
    observer.observe($sentinel);
  } catch(e) {}
}

// ── Load articles from cached JSON ────────────────────────────────────────────
async function loadArticles() {
  if (state.loading) return;
  state.loading = true;
  $btn.disabled = true;
  $btn.textContent = 'Refreshing…';

  try {
    const res = await fetch('./data/articles.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (data.crawledAt) {
      $crawledAt.textContent = 'Updated ' + relativeTime(new Date(data.crawledAt));
    }

    const fresh = (data.articles || []).filter(function(a) { return a.url && a.title; });
    fresh.sort(function(a, b) { return b.dateMs - a.dateMs; });
    state.articles = fresh;
    state.display  = buildDisplayOrder(state.articles);

    const cards = $feed.querySelectorAll('.article-card');
    cards.forEach(function(c) { c.remove(); });
    state.rendered = 0;

    if (state.articles.length === 0) {
      if ($emptyState) {
        $emptyState.querySelector('h2').textContent = 'No articles yet';
        $emptyState.querySelector('p').textContent =
          'The server crawls every 6 hours. You can also trigger a run manually via GitHub Actions.';
        $emptyState.hidden = false;
      }
    } else {
      if ($emptyState) $emptyState.hidden = true;
      renderBatch(PAGE_SIZE);
    }

  } catch(e) {
    showToast('Could not load articles — ' + e.message);
    if ($emptyState) $emptyState.hidden = false;
  } finally {
    state.loading = false;
    $btn.disabled = false;
    $btn.textContent = '↻ Refresh';
  }
}

// ── PWA ───────────────────────────────────────────────────────────────────────
function generateTouchIcon() {
  try {
    const c = document.createElement('canvas');
    c.width = c.height = 180;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#2a7d4f';
    ctx.fillRect(0, 0, 180, 180);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 68px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GN', 90, 90);
    document.getElementById('touch-icon').href = c.toDataURL('image/png');
  } catch(e) {}
}

function injectManifest() {
  const m = { name: 'Good News Finder', short_name: 'Good News', display: 'standalone',
    start_url: '.', scope: '.', background_color: '#0f1117', theme_color: '#2a7d4f' };
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(m));
  document.head.appendChild(link);
}

// ── Init ──────────────────────────────────────────────────────────────────────
$btn.addEventListener('click', loadArticles);
generateTouchIcon();
injectManifest();
setupObserver();
loadArticles(); // load immediately on open
setInterval(loadArticles, 6 * 60 * 60 * 1000); // re-fetch every 6h if tab stays open
</script>

</body>
</html>
